<!DOCTYPE html>
<html lang="zh-CN">
<head>
  {% include head.html %}
</head>
<body>
  <div class="container">
    <header class="site-header">
      <a href="{{ site.baseurl }}/" class="site-title">📡 OPC日报</a>
    </header>
    <section class="opc-manifesto" aria-label="OPC operating principle">
      <p class="opc-manifesto__formula">
        一人公司只有一条公式：<strong>(单价 × 数量) ÷ 决策时间 &gt; 你的活着成本</strong>。
      </p>
      <p class="opc-manifesto__rule">
        所有信号、所有功能、所有 commit，都为这个公式服务 —— 否则就是噪音。
      </p>
    </section>
    <main class="content">
      {{ content }}
    </main>
    <footer class="site-footer">
      <p>OPC日报 · 每日信号 · <a href="https://github.com/Claws-ZH/opc-daily-signal">GitHub</a></p>
    </footer>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('{{ site.baseurl }}/sw.js');
    }
  </script>
</body>
</html>
